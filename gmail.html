<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Account</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        body{
            background: #e43fc6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            width: 350px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            font-size: 40px;
            color: #555;
            margin-bottom: 10px;
        }

        p{
            text-align: center;
            color: #999;
            margin-bottom: 30px;
        }

        label{
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus{
            outline: none;
            border-color: #4a90e2;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #0f1115;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #020405;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Create new Account</h1>
        <p>Already Registered? Log in here.</p>

        <form>
            <label>Name</label>
            <input type="text" placeholder="muhammad Fikri">

            <label>Email</label>
            <input type="email" placeholder="muhammadfikri2220@gmail.com">

            <label>Password</label>
            <input type="password" placeholder="*****">

            <label>Birthday</label>
            <input

            <button type="submit">Create Account</button>
        </form>
    </div>

</body>
</html>
